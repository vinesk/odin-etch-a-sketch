<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Roboto:ital,wght@0,400;0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Etch-a-sketch</title>
  </head>
  <body>
    <h1>Etch-a-sketch</h1>
    <div id="buttonRow">
      <button id="resizeButton">Resize</button>
      <button id="clearButton">Clear</button>
      <button id="randomColorButton">Random colors</button>
      <button id="yourColorButton">Choose your color</button>
      <input
        id="colorPicker"
        name="Color picker"
        type="color"
        value="#666666"
      />
    </div>
    <div id="container"></div>
    <script src="js/script.js"></script>
  </body>
</html>
